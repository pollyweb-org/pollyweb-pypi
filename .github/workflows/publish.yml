name: Test and publish

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest build

      - name: Run test suite
        run: python -m pytest -m "not live_dns"

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distribution artifacts
        id: build
        run: |
          python -m pip install --upgrade pip build
          BASE_TAG="$(git describe --tags --abbrev=0 --match 'v*')"
          BASE_VERSION="${BASE_TAG#v}"
          DISTANCE="$(git rev-list "${BASE_TAG}..HEAD" --count)"
          IFS='.' read -r MAJOR MINOR PATCH <<EOF
          $BASE_VERSION
          EOF
          if [ "$DISTANCE" -eq 0 ]; then
            VERSION="$BASE_VERSION"
          else
            VERSION="${MAJOR}.${MINOR}.$((PATCH + DISTANCE))"
          fi
          echo "Publishing version ${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          export SETUPTOOLS_SCM_PRETEND_VERSION="$VERSION"
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Trigger pollyweb-aws layer rollout
        env:
          DISPATCH_TOKEN: ${{ secrets.POLLYWEB_AWS_DISPATCH_TOKEN }}
          RELEASE_VERSION: ${{ steps.build.outputs.version }}
        run: |
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "POLLYWEB_AWS_DISPATCH_TOKEN is not configured; skipping pollyweb-aws dispatch."
            exit 0
          fi

          curl --fail-with-body \
            --request POST \
            --url https://api.github.com/repos/pollyweb-org/pollyweb-aws/dispatches \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${DISPATCH_TOKEN}" \
            --data @- <<EOF
          {
            "event_type": "pollyweb_pypi_published",
            "client_payload": {
              "package": "pollyweb",
              "version": "${RELEASE_VERSION}",
              "source_repository": "${GITHUB_REPOSITORY}",
              "source_sha": "${GITHUB_SHA}"
            }
          }
          EOF
