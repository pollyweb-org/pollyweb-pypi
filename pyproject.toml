[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pollyweb"
version = "1.0.0"
description = "A neutral, open, and global web protocol that allows any person or AI agent to chat with any business, place, or thing."
authors = [ { name = "jorgemf", email = "pollyweb@pollycore.net" } ]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.7"

dependencies = [
    "cryptography>=41.0.0",
    "PyYAML>=6.0"
]

[project.scripts]
pollyweb-keys = "pollyweb.demo.keys:main"
pollyweb-setup = "pollyweb.demo.setup:main"

[project.urls]
"Website" = "https://www.pollyweb.org"

[tool.setuptools.packages.find]
include = ["pollyweb*"]

[tool.pytest.ini_options]
testpaths = [
    "tests",
    "pollyweb",
]

python_files = [
    "test_*.py",
    "*_test.py",
    "test.py",
    "*_TESTS.py",
]

python_classes = [
    "Test*",
    "*_TESTS",
]

python_functions = [
    "test_*",
    "Test*",
]
